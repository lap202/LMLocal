<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://app.local/css/github-dark.min.css">
    <link rel="stylesheet" href="https://app.local/css/app.css">
</head>
<body>

    <div id="top-info-bar">
        <div class="context-bar-wrapper" id="info-tooltip" title="Context usage: 0%">
            <div class="progress-container"><div id="token-bar-fill"></div></div>
        </div>
        <div class="model-info">
            <span id="conn-status" class="retryable">Connecting</span>
            <button id="retry-btn" style="display:none; background:none; border:none; cursor:pointer; padding:0 4px; font-size:14px; color:inherit; opacity:0.7;">↻</button>
            <span id="status-separator" style="display:none"> · </span>
            <span id="model-name">...</span>
        </div>
        <button class="btn-clear-icon" title="Clear history" tabindex="-1">🗑</button>
    </div>

    <div id="chat-container"
         role="log"
         aria-live="polite"
         aria-relevant="additions"
         aria-atomic="false">
    </div>

    <div id="status-bar"><span id="status-icon"></span><span id="status-text" aria-live="polite">Ready</span><span id="live-token-count" style="margin-left: 10px; display: none;"><span id="token-number">0 tokens</span><span id="tokens-speed" style="margin-left: 5px; opacity: 0.6; font-size: 0.9em;"></span></span></div>

    <div class="input-container">
        <textarea id="userInput" placeholder="Ask LMLocal..." rows="1" autofocus></textarea>
        <button id="mainBtn">Send</button>
    </div>

    <script src="https://app.local/js/marked.min.js"></script>
    <script type="module" src="https://app.local/js/smd.min.js"></script>
    <script src="https://app.local/js/highlight.min.js"></script>
    <script type="module" src="https://app.local/js/app.js"></script>
</body>
</html>
